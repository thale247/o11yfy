services:
  # -----------------------------
  # OpenTelemetry Collector
  # -----------------------------
  otel-collector:
      image: otel/opentelemetry-collector-contrib:latest
      command: ["--config=/etc/otelcol/config.yaml"]
      volumes:
        - ./otel/provisioning/otel-collector-config.yaml:/etc/otelcol/config.yaml
      ports:
        - "4317:4317"
        - "4318:4318"
      depends_on:
        - tempo
        - loki
        - prometheus

  # -----------------------------
  # Prometheus (metrics)
  # -----------------------------
  prometheus:
      image: prom/prometheus:latest
      user: "root" # Ensures it can write to the local bind mount
      volumes:
        - ./prometheus/provisioning/prometheus.yml:/etc/prometheus/prometheus.yml
        - ./data/prometheus:/prometheus
      ports:
        - "9090:9090"
      command:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'

  # -----------------------------
  # Grafana (UI)
  # -----------------------------
  grafana:
      image: grafana/grafana:latest
      user: "root" # Prevents dashboard save errors
      ports:
        - "3000:3000"
      environment:
        - GF_SECURITY_ADMIN_USER=admin
        - GF_SECURITY_ADMIN_PASSWORD=admin
        - GF_INSTALL_PLUGINS=grafana-piechart-panel
        - GF_FEATURE_TOGGLES_ENABLE=alertingUnified
      volumes:
       # - ./grafana/provisioning/datasources/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
        - ./data/grafana:/var/lib/grafana
        - ./grafana/provisioning:/etc/grafana/provisioning
        - ./grafana/grafana.ini:/etc/grafana/grafana.ini
        - ./grafana/dashboards:/var/lib/grafana/dashboards
      depends_on:
        - prometheus
        - loki
        - tempo

  # -----------------------------
  # Loki (logs)
  # -----------------------------
  loki:
      image: grafana/loki:latest
      ports:
        - "3100:3100"
      command: -config.file=/etc/loki/local-config.yaml
      volumes:
        - ./loki/provisioning/loki-config.yaml:/etc/loki/local-config.yaml
        - ./data/loki:/loki

  # -----------------------------
  # Tempo (traces)
  # -----------------------------
  tempo:
    image: grafana/tempo:latest
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    ports:
      - "3200:3200"
    volumes:
      - ./tempo/provisioning/tempo.yaml:/etc/tempo/tempo.yaml
      - ./data/tempo:/var/tempo

  alertmanager:
      image: prom/alertmanager:latest
      ports:
        - "9093:9093"
      volumes:
        - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      command:
        - "--config.file=/etc/alertmanager/alertmanager.yml"